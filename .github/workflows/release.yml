# Build, sign and publish a TagDash release (auto-update artifacts included).
#
# Trigger: push a version tag (e.g. `v0.1.0`) — the tag's version must match the
# `version` in src-tauri/tauri.conf.json. tauri-action then:
#   • builds the app (runs `npm run build` via beforeBuildCommand),
#   • signs the bundles with the minisign private key (createUpdaterArtifacts),
#   • creates the GitHub Release and uploads the installers + their `.sig` files
#     and the updater manifest `latest.json`.
#
# The running app checks `…/releases/latest/download/latest.json` at launch
# (see plugins.updater.endpoints) and updates itself when the published version is
# newer than the installed one.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   • TAURI_SIGNING_PRIVATE_KEY          — the full contents of your private key
#                                          file (~/.tauri/tagdash.key). NEVER commit it.
#   • TAURI_SIGNING_PRIVATE_KEY_PASSWORD — the password set at key generation
#                                          (leave empty if you chose none).

name: Release

on:
  push:
    tags:
      - "v*"
  # Allow a manual run from the Actions tab as well.
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Sequential builds: each platform's job merges its entry into the SAME
      # release `latest.json`. Running them in parallel can race and leave the
      # manifest with only one platform (the auto-update then 404s for the other).
      max-parallel: 1
      matrix:
        include:
          # Windows → .msi / .exe (NSIS) installers.
          - platform: windows-latest
            args: ""
            rust_targets: ""
          # macOS → universal .dmg (runs on both Apple Silicon and Intel Macs).
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # To also ship Linux, add: { platform: ubuntu-22.04, args: "", rust_targets: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TagDash ${{ github.ref_name }}"
          releaseBody: "Téléchargez l'installeur ci-dessous. La mise à jour automatique se fait au lancement de l'app."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
