# Build, sign and publish a TagDash release (auto-update artifacts included).
#
# Trigger: push a version tag (e.g. `v0.1.0`) — the tag's version must match the
# `version` in src-tauri/tauri.conf.json. tauri-action then:
#   • builds the app (runs `npm run build` via beforeBuildCommand),
#   • signs the bundles with the minisign private key (createUpdaterArtifacts),
#   • creates the GitHub Release and uploads the installers + their `.sig` files
#     and the updater manifest `latest.json`.
#
# The running app checks `…/releases/latest/download/latest.json` at launch
# (see plugins.updater.endpoints) and updates itself when the published version is
# newer than the installed one.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   • TAURI_SIGNING_PRIVATE_KEY          — the full contents of your private key
#                                          file (~/.tauri/tagdash.key). NEVER commit it.
#   • TAURI_SIGNING_PRIVATE_KEY_PASSWORD — the password set at key generation
#                                          (leave empty if you chose none).

name: Release

on:
  push:
    tags:
      - "v*"
  # Allow a manual run from the Actions tab as well.
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    # Hard cap so a runner that never gets picked up (e.g. a retired image) fails
    # fast instead of hanging the workflow for the default 6 hours.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      # Sequential builds: each platform's job merges its entry into the SAME
      # release `latest.json`. Running them in parallel can race and leave the
      # manifest with only one platform (the auto-update then 404s for the others).
      max-parallel: 1
      matrix:
        include:
          # macOS Intel (darwin-x86_64) — runs FIRST so build failures surface
          # quickly and the run can be cancelled before the longer jobs start.
          # Built on an Apple-Silicon runner via Rosetta (GitHub retired Intel
          # `macos-13` runners). An x86_64 Rust toolchain + x86_64 Node make the
          # whole build run as x86_64 (host == target), so native deps compile
          # NATIVE — not cross-compiled. Driven by `scripts/build-macos-intel.sh`
          # which creates the release + seeds latest.json if it's the first to
          # publish, then subsequent tauri-action jobs merge their platform entry.
          - platform: macos-14
            args: ""
            rust_targets: ""
            intel: true
          # Windows → .msi / .exe (NSIS) installers → windows-x86_64 updater key.
          - platform: windows-latest
            args: ""
            rust_targets: ""
          # macOS Apple Silicon → NATIVE arm64 build → darwin-aarch64 updater key.
          - platform: macos-14
            args: ""
            rust_targets: ""
          # To also ship Linux, add: { platform: ubuntu-22.04, args: "", rust_targets: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # whisper-rs (offline STT) builds whisper.cpp via CMake and generates FFI
      # bindings via bindgen (needs libclang). CMake is ensured on every platform;
      # on Windows we also install LLVM and point bindgen at it. macOS gets libclang
      # from the Xcode Command Line Tools already on the runner.
      - name: Setup CMake (whisper.cpp build)
        uses: lukka/get-cmake@latest

      - name: Install LLVM / libclang (Windows — whisper-rs bindgen)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      # whisper.cpp's ggml uses C++17 std::filesystem (fs::u8path), which clang
      # marks "unavailable" below macOS 10.15. Tauri's default deployment target is
      # 10.13, so the C++ compile fails with:
      #   error: '~path' is unavailable: introduced in macOS 10.15
      # Pin the deployment target to 10.15 (matches bundle.macOS.minimumSystemVersion
      # in tauri.conf.json) so std::filesystem is available. macOS only.
      - name: Pin macOS deployment target (whisper.cpp std::filesystem ≥ 10.15)
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> "$GITHUB_ENV"

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign and publish
        # The Intel job builds + publishes via its own script (Rosetta), not tauri-action.
        if: ${{ !matrix.intel }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TagDash ${{ github.ref_name }}"
          releaseBody: "Téléchargez l'installeur ci-dessous. La mise à jour automatique se fait au lancement de l'app."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # ── macOS Intel (EXPERIMENTAL, Rosetta-native) ────────────────────────────
      # Runs only on the `intel: true` matrix entry, after the jobs above created the
      # release + latest.json. Reuses scripts/build-macos-intel.sh (the same script
      # used locally), which re-execs under `arch -x86_64`, builds, signs, uploads the
      # .dmg + updater bundle, and merges the darwin-x86_64 entry into latest.json.
      - name: Setup Rosetta + x86_64 toolchains (macOS Intel)
        if: matrix.intel
        run: |
          set -eux
          # Rosetta lets the arm64 runner execute x86_64 binaries.
          sudo softwareupdate --install-rosetta --agree-to-license || true
          # x86_64 Rust toolchain — its real cargo/rustc are x86_64 → native (not cross).
          rustup toolchain install stable-x86_64-apple-darwin --force-non-host
          rustup target add x86_64-apple-darwin
          echo "$HOME/.rustup/toolchains/stable-x86_64-apple-darwin/bin" >> "$GITHUB_PATH"
          # x86_64 Node — the whole build runs under Rosetta, so node must be x64 too.
          # Match the exact version actions/setup-node installed.
          NODE_VERSION="$(node --version | sed 's/^v//')"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" -o /tmp/node-x64.tgz
          mkdir -p /tmp/node-x64 && tar -xzf /tmp/node-x64.tgz -C /tmp/node-x64 --strip-components=1
          echo "/tmp/node-x64/bin" >> "$GITHUB_PATH"

      - name: Build + publish macOS Intel (.dmg + auto-update)
        if: matrix.intel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-macos-intel.sh --publish "${{ github.ref_name }}"
